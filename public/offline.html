<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet aloqasi yo'q - Hope Study</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #6B21A8;
        }
        p {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
        }
        .btn {
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #6B21A8;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Internet aloqasi yo'q</h1>
        <p>Iltimos, internet ulanishini tekshiring. Hope Study ilovasi tarmoq tiklanganda avtomatik yangilanadi.</p>
        <a href="/" class="btn">Qayta urinish</a>
    </div>
    <script>
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
